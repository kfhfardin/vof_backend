# Full-stack compose: builds the production image and runs web + worker
# alongside the local infra services. Use this to validate the production
# container locally before pushing to a real environment.
#
#   docker compose --env-file .env.local up --build
#
# For the dev inner-loop (host-side uvicorn against just the infra),
# keep using docker-compose.local.yml.

x-app-env: &app-env
  DEPLOYMENT_PROFILE: cloud
  ENVIRONMENT: ${ENVIRONMENT:-dev}
  DATABASE_URL: postgresql+asyncpg://votf:votf@postgres:5432/votf_app
  BRAIN_DATABASE_URL: postgresql+asyncpg://votf:votf@postgres:5432/votf_brain
  REDIS_URL: redis://redis:6379/0
  S3_BUCKET: ${S3_BUCKET:-votf-local}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT_URL: http://minio:9000
  JWT_SECRET: ${JWT_SECRET}
  AGENTPHONE_API_KEY: ${AGENTPHONE_API_KEY:-}
  AGENTPHONE_WEBHOOK_SECRET: ${AGENTPHONE_WEBHOOK_SECRET:-}
  SUPERMEMORY_API_KEY: ${SUPERMEMORY_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_BASE_URL: ${LLM_BASE_URL:-https://api.anthropic.com/v1/openai}
  LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-claude-sonnet-4-6}
  LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  postgres:
    # pgvector/pgvector:pg16 == postgres:16 + the pgvector extension preinstalled.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: votf
      POSTGRES_PASSWORD: votf
      POSTGRES_DB: votf_app
    volumes:
      - ./scripts/postgres_init/:/docker-entrypoint-initdb.d/
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votf"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb -p local/${S3_BUCKET:-votf-local} || true
      "

  # One-shot: run both app + brain migrations to head, then exit.
  # Web and worker `depends_on` this so they don't boot against an
  # un-migrated schema.
  migrate:
    build: .
    image: vof-backend:local
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - >
        python -m scripts.alembic_wrapper app upgrade head &&
        python -m scripts.alembic_wrapper brain upgrade head
    restart: "no"

  web:
    build: .
    image: vof-backend:local
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports: ["8000:8000"]
    # Default CMD from the Dockerfile runs uvicorn.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  worker:
    image: vof-backend:local
    environment:
      <<: *app-env
    depends_on:
      web:
        condition: service_healthy
    command: ["arq", "app.workers.settings.WorkerSettings"]

volumes:
  pg_data:
  minio_data:
