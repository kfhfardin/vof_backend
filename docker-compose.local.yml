services:
  postgres:
    # pgvector/pgvector:pg16 == postgres:16 + the pgvector extension preinstalled.
    # The brain DB enables it via scripts/postgres_init/01_dbs.sh.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: votf
      POSTGRES_PASSWORD: votf
      POSTGRES_DB: votf_app
    volumes:
      - ./scripts/postgres_init/:/docker-entrypoint-initdb.d/
      - pg_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votf"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/votf-local || true
      "

volumes:
  pg_data:
  minio_data:
